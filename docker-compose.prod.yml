name: suape_frontend

# Compose de PRODUÇÃO (VPS). Imagem do GHCR (publicada pelo CI); o systemd timer
# faz pull + up -d a cada 2 min. Publica só em 127.0.0.1:3003 — o nginx do host
# faz o TLS e o proxy de almirante.chat/www para cá. A URL da API já vem embutida
# no build (NEXT_PUBLIC_API_URL=https://api.almirante.chat).
services:
  web:
    image: ghcr.io/jeffersonest/hackaton-suape-frontend:latest
    container_name: suape_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3003}:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/entrar"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
